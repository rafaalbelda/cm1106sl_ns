esphome:
  name: airq32-w
  friendly_name: AirQ32-W
  on_boot:
    - delay: 5s
    - lvgl.widget.hide: boot_screen  

external_components:
  #- source: github://rafaalbelda/cm1106sl_ns@i2c
  - source: github://rafaalbelda/cm1106sl_ns@uart
    components: [cm1106sl_ns]
    refresh: 0s
#     - source:
#       type: git
#       url: https://github.com/rafaalbelda/cm1106sl_ns
#       ref: 44633e2c3778459598545e45e99cbe86a7a98294
#     components: [ cm1106sl_ns ]
#     refresh: 

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: esp-idf

# Enable logging
logger:
#  level: VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: "uhFm0oRZ0fpToy++Jzl9+TA3RLc9XQtwrNOjH5qgexw="

  on_client_connected:
    - wait_until:
        condition:
          api.connected:
            state_subscription_only: true
    - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

ota:
  - platform: esphome
    password: "a165369f9c6b3dcd1412a7be6b47a7fa"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Airq32-W Fallback Hotspot"
    password: "GIMdxfQ2fVOu"

captive_portal:

uart:
  - id: uart_pm
    rx_pin: 16
    tx_pin: 17
    baud_rate: 9600
    rx_timeout: 10
  #  debug:
  - id: uart_cm
    rx_pin: 33
    tx_pin: 32
    baud_rate: 9600
  #  debug:

i2c:
  - id: i2c_main
    sda: GPIO21
    scl: GPIO22
    scan: true

spi:
  - id: spi_bus
    clk_pin: 18
    mosi_pin: 23
    #miso_pin: 19

sensor:
  # - platform: cm1106
  #   uart_id: uart_cm
  #   co2:
  #     name: CO2
  - platform: cm1106sl_ns
    id: my_co2
    uart_id: uart_cm
    update_interval: 60s
    config_period: 60
    smoothing_samples: 2
    abc_active: true
    abc_cycle_days: 7
    abc_baseline: 400
    co2:
      name: "CO2 Level"
      id: co2
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_co2_value
              text:
                format: "%.0f"
                args: [ 'x' ]
                if_nan: "--"

  - platform: bme280_i2c
    i2c_id: i2c_main
    address: 0x76
    temperature:
      name: "Temperatura"
      id: my_temperature
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_temperature_value
              text:
                format: "%.1f"
                args: [ 'x' ]
                if_nan: "--"
    pressure:
      name: "Presión"
      id: my_pressure
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_pressure_value
              text:
                format: "%.0f"
                args: [ 'x' ]
                if_nan: "--"
    humidity:
      name: "Humedad"
      id: my_humidity
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_humidity_value
              text:
                format: "%.1f"
                args: [ 'x' ]
                if_nan: "--"
    update_interval: 60s  # Synchronized with CO2 sensor 

  - platform: absolute_humidity
    name: Absolute Humidity
    temperature: my_temperature
    humidity: my_humidity

  - platform: pmsx003
    uart_id: uart_pm
    type: PMSX003
    pm_1_0:
      name: "PM1.0"
      id: pm1_sensor
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_pm1_value
              text:
                format: "%.0f"
                args: [ 'x' ]
                if_nan: "--"
    pm_2_5:
      name: "PM2.5"
      id: pm25_sensor
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_pm25_value
              text:
                format: "%.0f"
                args: [ 'x' ]
                if_nan: "--"
    pm_10_0:
      name: "PM10"
      id: pm10_sensor
      on_value:
        then:
          - lvgl.label.update:
              id: lvgl_pm10_value
              text:
                format: "%.0f"
                args: [ 'x' ]
                if_nan: "--"
    update_interval: 30s  # Synchronized with other sensors

  - platform: aqi
    name: "European Air Quality Index"
    pm_2_5: pm25_sensor
    pm_10_0: pm10_sensor
    calculation_type: CAQI
    id: euaqi
    on_value:
      then:
        - lvgl.label.update:
            id: lvgl_aqi_value_p1
            text:
              format: "%.0f"
              args: [ 'x' ]
              if_nan: "--"
        - lvgl.label.update:
            id: [lvgl_aqi_value_p2, lvgl_aqi_value_p3]
            text:
              format: "%.1f"
              args: [ 'x' ]
              if_nan: "--"

binary_sensor:
  - platform: gpio
    pin: 
        number: GPIO14
        mode: INPUT_PULLUP
        inverted: true
    name: "Button"
    id: toggle_display
    on_press:
      then:
      - display.page.show_next: my_display
      - lvgl.page.next:
          animation: OUT_LEFT
          time: 300ms

# Define a PWM output on the ESP32
output:
  - platform: ledc
    pin: GPIO15
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON


font:
    # gfonts://family[@weight]
  - file: "gfonts://Roboto"
    id: font10
    size: 10
  - file: "gfonts://Roboto"
    id: font16
    size: 16
  - file: "gfonts://Roboto"
    id: font32
    size: 32

image:
  - file: https://media.esphome.io/logo/logo.png
    id: boot_logo
    resize: 200x200
    type: RGB565
    transparency: alpha_channel

