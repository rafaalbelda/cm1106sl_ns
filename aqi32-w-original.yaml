esphome:
  name: airq32-w
  friendly_name: AirQ32-W
  on_boot:
    - delay: 5s
    - lvgl.widget.hide: boot_screen  

external_components:
  #- source: github://rafaalbelda/cm1106sl_ns@i2c
  - source: github://rafaalbelda/cm1106sl_ns@uart
    components: [cm1106sl_ns]
    refresh: 0s
#     - source:
#       type: git
#       url: https://github.com/rafaalbelda/cm1106sl_ns
#       ref: 44633e2c3778459598545e45e99cbe86a7a98294
#     components: [ cm1106sl_ns ]
#     refresh: 

esp32:
  board: az-delivery-devkit-v4
  framework:
    type: esp-idf

# Enable logging
logger:
#  level: VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: "uhFm0oRZ0fpToy++Jzl9+TA3RLc9XQtwrNOjH5qgexw="

  on_client_connected:
    - wait_until:
        condition:
          api.connected:
            state_subscription_only: true
    - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus

ota:
  - platform: esphome
    password: "a165369f9c6b3dcd1412a7be6b47a7fa"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Airq32-W Fallback Hotspot"
    password: "GIMdxfQ2fVOu"

captive_portal:

uart:
  - id: uart_pm
    rx_pin: 16
    tx_pin: 17
    baud_rate: 9600
    rx_timeout: 10
  #  debug:
  - id: uart_cm
    rx_pin: 33
    tx_pin: 32
    baud_rate: 9600
  #  debug:

i2c:
  - id: i2c_main
    sda: GPIO21
    scl: GPIO22
    scan: true

spi:
  - id: spi_bus
    clk_pin: 18
    mosi_pin: 23
    #miso_pin: 19

sensor:
  # - platform: cm1106
  #   uart_id: uart_cm
  #   co2:
  #     name: CO2
  - platform: cm1106sl_ns
    id: my_co2
    uart_id: uart_cm
    update_interval: 60s
    config_period: 60
    smoothing_samples: 2
    abc_active: true
    abc_cycle_days: 7
    abc_baseline: 400
    co2:
      name: "CO2 Level"
      id: co2   

  - platform: bme280_i2c
    i2c_id: i2c_main
    address: 0x76
    temperature:
      name: "Temperatura"
      id: my_temperature
    pressure:
      name: "Presión"
      id: my_pressure
    humidity:
      name: "Humedad"
      id: my_humidity
    update_interval: 60s  # Synchronized with CO2 sensor 

  - platform: absolute_humidity
    name: Absolute Humidity
    temperature: my_temperature
    humidity: my_humidity

  - platform: pmsx003
    uart_id: uart_pm
    type: PMSX003
    pm_1_0:
      name: "PM1.0"
      id: pm1_sensor
    pm_2_5:
      name: "PM2.5"
      id: pm25_sensor
    pm_10_0:
      name: "PM10"
      id: pm10_sensor
    update_interval: 30s  # Synchronized with other sensors

  - platform: aqi
    name: "European Air Quality Index"
    pm_2_5: pm25_sensor
    pm_10_0: pm10_sensor
    calculation_type: CAQI
    id: euaqi

binary_sensor:
  - platform: gpio
    pin: 
        number: GPIO14
        mode: INPUT_PULLUP
        inverted: true
    name: "Button"
    id: toggle_display
    on_press:
      then:
      - display.page.show_next: my_display

# Define a PWM output on the ESP32
output:
  - platform: ledc
    pin: GPIO15
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON


font:
    # gfonts://family[@weight]
  - file: "gfonts://Roboto"
    id: font10
    size: 10
  - file: "gfonts://Roboto"
    id: font16
    size: 16
  - file: "gfonts://Roboto"
    id: font32
    size: 32

image:
  - file: https://media.esphome.io/logo/logo.png
    id: boot_logo
    resize: 200x200
    type: RGB565
    transparency: alpha_channel

lvgl:
  displays: my_display1

  top_layer:
    widgets:
      - label:
          text: "\uF1EB"
          id: lbl_hastatus
          hidden: true
          align: top_right
          x: -2
          y: 7
          text_align: right
          text_color: 0xFFFFFF
        
      # make sure it's the last one in this list:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_logo
                y: -50
            - spinner:
                align: CENTER
                y: 50
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen


display:
#   - platform: ili9xxx
#     model: ili9342
#     cs_pin: 4 
#     dc_pin: 2
#     reset_pin: 0
#     invert_colors: true
# #    dimensions: 240x320
#     color_palette: 8BIT
#     rotation: 0

  - platform: ili9xxx
    id: my_display1
    model: ili9342
    cs_pin: 4 
    dc_pin: 2
    reset_pin: 0
    color_palette: 8BIT
    invert_colors: false
    #update_interval: 20s
    auto_clear_enabled: false
    #show_test_card: true
    ## 90 degrees - use swap_xy with mirror_x
    ## 180 degrees - use mirror_x with mirror_y
    ## 270 degrees - use swap_xy with mirror_y
    ## With 90 and 270 rotations you will also need to swap the dimensions ‘’height’’ and ‘’width’’
    ## normal: height 320, width 240
    # transform:
    #   mirror_x: false
    #   mirror_y: true
    # dimensions:
    #   height: 320
    #   width: 240
    ## rotated 90
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    dimensions:
      height: 240
      width: 320

    # lambda: |-
    #   it.fill(Color(255, 0, 0));

  
  - platform: ssd1306_i2c
    i2c_id: i2c_main
    model: "SSD1306 128x64"
    #address: 0x3C
    # rotation: 180°
    # contrast: 80%
    # flip_x: true
    # flip_y: false
    id: my_display
    pages:
       - id: page1
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);


            // Print AQI
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.0f", id(euaqi).state);

            // Print CO2
            it.print(3, h/2+3, id(font16), "CO2:");
            it.printf(w/2, 3*h/4, id(font32), display::TextAlign::CENTER, "%.0f", id(co2).state);
            //it.printf(w/2, 3*h/4, id(font32), display::TextAlign::CENTER, "%.0f", id(my_co2).state);
       - id: page2
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);
            it.line(w/3, h/2, w/3, h);
            it.line(2*w/3, h/2, 2*w/3, h);

            // Print AQI
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.1f", id(euaqi).state);

            // Print PM1.0
            it.print(2, h/2+2, id(font10), display::TextAlign::LEFT, "PM1.0:");
            it.printf(w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm1_sensor).state);

            // Print PM2.5
            it.print(w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "PM2.5:");
            it.printf(w/2, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm25_sensor).state);

            // Print PM10
            it.print(2*w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "PM10:");
            it.printf(5*w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm10_sensor).state);

       - id: page3
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);
            it.line(w/3, h/2, w/3, h);
            it.line(2*w/3, h/2, 2*w/3, h);

            // Print AQI
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.1f", id(euaqi).state);

            // Print Ta
            it.print(2, h/2+2, id(font10), display::TextAlign::LEFT, "T:");
            it.printf(w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.1f", id(my_temperature).state);

            // Print H
            it.print(w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "H:");
            it.printf(w/2, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.1f", id(my_humidity).state);

            // Print P
            it.print(2*w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "P:");
            it.printf(5*w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(my_pressure).state);

