esphome:
  name: airq32
  friendly_name: AirQ32

external_components:
  - source: github://rafaalbelda/cm1106sl_ns@i2c
    components: [cm1106sl_ns]
  #  - source: components

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "yEC5Exm6Xd23z9nawIiouA4v9oj4NG5uIcx/c9htlNo="

ota:
  - platform: esphome
    password: "df70e3845fd37c0c3a82554e1f9a9974"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 13dB  # default is 20dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Airq32 Fallback Hotspot"
    password: "fQIAdJyW9zVY"

captive_portal:

esp32_ble_tracker:

bluetooth_proxy:
  active: true

uart:
  - id: uart_cm
    rx_pin: 23
    tx_pin: 5
    baud_rate: 9600
    debug:
  - id: uart_pm
    rx_pin: 16
    tx_pin: 17
    baud_rate: 9600
  #  debug:


i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz  # Increase frequency for multiple I2C devices

sensor:
  # UART CM1106 (commented - using I2C CM1106SL-NS instead)
  # - platform: cm1106
  #   uart_id: uart_cm
  #   co2:
  #     name: CO2
  #     id: my_co2

  - platform: cm1106sl_ns
    id: my_co2_i2c
    update_interval: 60s  # Measurement period in ESPHome
    debug: true          # Enable I2C debug logging
    
    co2:
      name: "CO2 Concentration"
    
    stability:
      name: "CO2 Stability"
    
    ready:
      name: "Sensor Ready"
    
    error:
      name: "Sensor Error"
    
    iaq_numeric:
      name: "Air Quality Index"  
#   - platform: cm1106sl_ns
# #    id: my_co2
#     uart_id: uart_cm
#     debug: true
#     #name: "CM1106SL-NS"
#     #update_interval: 60s
#     # measurement_period: 20s    # timeout sin datos (default 15s)
#     # warmup_timeout: 90s        # timeout durante warmup (default 60s)
#     # config_period: 10        # período en segundos (4-600s, default 4s)
#     # smoothing_samples: 3     # datos suavizados (1-15, default 1)
#     co2:
#        name: "CO2 (ppm)"
#     # ready:
#     #   name: "CM1106 Ready"
#     # error:
#     #   name: "CM1106 Error"
#     # iaq_numeric:
#     #   name: "IAQ (numeric)"
#     # Opcionales:
#     # df3:
#     #   name: "DF3"
#     # df4:
#     #   name: "DF4"
#     # status:
#     #   name: "CM1106 Status"
#     # stability:
#     #   name: "Stability"
#     # iaq_text:
#     #   name: "IAQ (text)"

  - platform: bme280_i2c
    temperature:
      name: "Temperatura"
      id: my_temperature
    pressure:
      name: "Presión"
      id: my_pressure
    humidity:
      name: "Humedad"
      id: my_humidity
    address: 0x76
    update_interval: 60s  # Synchronized with CO2 sensor

  - platform: absolute_humidity
    name: Absolute Humidity
    temperature: my_temperature
    humidity: my_humidity

  - platform: pmsx003
    uart_id: uart_pm
    type: PMSX003
    pm_1_0:
      name: "PM1.0"
      id: pm1_sensor
    pm_2_5:
      name: "PM2.5"
      id: pm25_sensor
    pm_10_0:
      name: "PM10"
      id: pm10_sensor
    update_interval: 60s  # Synchronized with other sensors

  - platform: aqi
    name: "European Air Quality Index"
    pm_2_5: pm25_sensor
    pm_10_0: pm10_sensor
    calculation_type: CAQI
    id: euaqi

binary_sensor:
  - platform: gpio
    pin: 
        number: GPIO19
        mode: INPUT_PULLUP
        inverted: true
    name: "Button"
    id: toggle_display
    on_press:
      then:
      - display.page.show_next: my_display

font:
    # gfonts://family[@weight]
  - file: "gfonts://Roboto"
    id: font10
    size: 10
  - file: "gfonts://Roboto"
    id: font16
    size: 16
  - file: "gfonts://Roboto"
    id: font32
    size: 32

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    # rotation: 180°
    # contrast: 80%
    # flip_x: true
    # flip_y: false
    id: my_display
    pages:
       - id: page1
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);
            it.line(w/3, h/2, w/3, h);
            it.line(2*w/3, h/2, 2*w/3, h);

            // Print AQI
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.1f", id(euaqi).state);

            // Print PM1.0
            it.print(2, h/2+2, id(font10), display::TextAlign::LEFT, "PM1.0:");
            it.printf(w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm1_sensor).state);

            // Print PM2.5
            it.print(w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "PM2.5:");
            it.printf(w/2, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm25_sensor).state);

            // Print PM10
            it.print(2*w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "PM10:");
            it.printf(5*w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(pm10_sensor).state);

       - id: page2
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);
            it.line(w/3, h/2, w/3, h);
            it.line(2*w/3, h/2, 2*w/3, h);

            // Print AQI
            //it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.1f", id(pm25_sensor).state);
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.1f", id(euaqi).state);

            // Print Ta
            it.print(2, h/2+2, id(font10), display::TextAlign::LEFT, "T:");
            it.printf(w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.1f", id(my_temperature).state);

            // Print H
            it.print(w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "H:");
            it.printf(w/2, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.1f", id(my_humidity).state);

            // Print P
            it.print(2*w/3+2, h/2+2, id(font10), display::TextAlign::LEFT, "P:");
            it.printf(5*w/6, 3*h/4+4, id(font16), display::TextAlign::CENTER, "%.0f", id(my_pressure).state);

       - id: page3
         lambda: |-
            // Clear the display
            it.fill(COLOR_OFF);
            
            int h = it.get_height();
            int w = it.get_width();
            
            // Draw a rectangle
            it.rectangle(0, 0, w, h);

            it.line(1, h/2, w-1, h/2);


            // Print AQI
            it.print(3, 3, id(font16), "AQU:");
            it.printf(w/2, h/4, id(font32), display::TextAlign::CENTER, "%.0f", id(euaqi).state);

            // Print CO2
            it.print(3, h/2+3, id(font16), "CO2:");
            it.printf(w/2, 3*h/4, id(font32), display::TextAlign::CENTER, "%.0f", id(my_co2).state);


    